<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Витрина товаров</title>
    <style>
        *{box-sizing:border-box}
        body{font-family:Arial,sans-serif;margin:0;padding:20px;background:#f5f5f5}
        .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:20px;margin-top:20px}
        .product-card{background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.1);transition:transform .2s;display:flex;flex-direction:column}
        .product-card:hover{transform:translateY(-5px)}
        .product-image{width:100%;height:200px;object-fit:cover;background:#eee}
        .product-info{padding:15px;flex:1}
        .product-title{font-size:1.1rem;margin:0 0 8px;font-weight:bold}
        .product-price{color:#e67e22;font-size:1.2rem;font-weight:bold;margin:10px 0}
        .product-link{display:inline-block;background:#27ae60;color:#fff;text-decoration:none;padding:8px 12px;border-radius:4px;text-align:center;margin-top:10px}
        .product-link:hover{background:#2ecc71}
        .error,.loading{text-align:center;padding:40px;font-size:1.2rem}
        .error{background:#f8d7da;color:#721c24}
        footer{margin-top:30px;font-size:.8rem;text-align:center;color:#777}
    </style>
</head>
<body>
<div id="productsContainer"><div class="loading">Загрузка товаров...</div></div>
<footer>Обновление каждые 2 часа</footer>
<script>
(async function(){
    const container = document.getElementById('productsContainer');
    try {
        const resp = await fetch('products.json');
        if(!resp.ok) throw new Error('Нет данных');
        const products = await resp.json();
        if(!products.length) { container.innerHTML='<div class="error">Нет товаров</div>'; return; }
        let html = '<div class="products-grid">';
        for(const p of products){
            // ↓↓↓ ИЗМЕНИТЕ КЛЮЧИ НА РЕАЛЬНЫЕ (например, 'Name', 'Price', 'URL', 'Image') ↓↓↓
            const title = p['name'] || 'Без названия';
            const price = p['price'] || '0';
            const link = p['url'] || '#';
            const image = p['picture'] || '';
            html += `
                <div class="product-card">
                    ${image ? `<img class="product-image" src="${escapeHtml(image)}" alt="${escapeHtml(title)}" onerror="this.src='https://via.placeholder.com/200?text=No+image'">` : '<div class="product-image" style="background:#ddd;display:flex;align-items:center;justify-content:center">Нет фото</div>'}
                    <div class="product-info">
                        <div class="product-title">${escapeHtml(title)}</div>
                        <div class="product-price">${escapeHtml(price)}</div>
                        ${link !== '#' ? `<a href="${escapeHtml(link)}" class="product-link" target="_blank" rel="nofollow sponsored">Купить</a>` : ''}
                    </div>
                </div>
            `;
        }
        html += '</div>';
        container.innerHTML = html;
    } catch(e) {
        console.error(e);
        container.innerHTML = '<div class="error">Ошибка загрузки витрины</div>';
    }
})();
function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g,function(m){if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';return m;}); }
</script>
</body>
</html>
