                <description>Медная смазка предназначена для обработки направляющих тормозных колодок, резьбы свечей зажигания, деталей системы выхлопа, штифтов, фланцев и других металлических деталей, подвергающихся воздействию экстремально высоких температур, давления и агрессивной среды. Ультрадисперсный медный порошок, входящий в состав смазки, образует на поверхности трущихся деталей плёнку, предотвращающую холодное сваривание и коррозионное прикипание. Порошок сохраняет смазочные свойства продукта в широком диапазоне температур от -30 до +1100 °С, тем самым предотвращает образование задиров и коррозионное истирание металлических соединений. Медная смазка ЛУКОЙЛ&amp;nbsp;обладает высокой стойкостью к атмосферным осадкам, щелочной среде и растворам дорожных реагентов.
 
 Указания по применению
 Использовать при температуре не ниже +10 °С. Перед использованием энергично встряхнуть баллон. Нанести смазку тонким слоем на очищенные от рыхлой ржавчины и окалины обрабатываемые детали. Для труднодоступных мест использовать удлинительную трубочку.
 
 Меры безопасности при использовании
 Воспламеняющийся аэрозоль. Баллон под давлением. При нагревании возможен взрыв. Беречь от источника воспламенения/искр/открытого огня. Не курить. Не нарушать целостности упаковки и не сжигать, даже после использования. Беречь от солнечных лучей, избегать нагревания выше 50 °С. При необходимости обратиться за медицинской помощью, по возможности показать упаковку/маркировку продукта. Хранить в недоступном для детей месте. Перед использованием ознакомиться с инструкцией по применению/маркировкой продукта.
 
 Срок годности и хранения
 Гарантийный срок хранения 36 месяцев с даты изготовления в таре производителя при соблюдении условии транспортирования и хранения.
 
