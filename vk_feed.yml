 Меры безопасности при использовании
 Использовать осторожно: воспламеняющийся аэрозоль, баллон под давлением. При нагревании возможен взрыв. Беречь от источников воспламенения, нагревания, искр, открытого огня. Не курить при использовании. Не нарушать целостности упаковки и не сжигать даже после использования. Беречь от солнечных лучей, избегать нагревания выше 50°С.
 
