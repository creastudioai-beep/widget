name: Update Products

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run update script (JSON + YML)
        run: node update_products.js
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "bot@github.com"
          git add products.json vk_feed.yml
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update products"
          git push
